# SPDX-License-Identifier: Apache-2.0
#
# Compiled Falco Rules File
# Generated: 2026-05-04
# 
# This file contains the following rules with all required macros and lists:
# - DB program spawned process
# - Delete or rename shell history
# - Launch Ingress Remote File Copy Tools in Container
# - Launch Suspicious Network Tool in Container
# - Read environment variable from /proc files
# - Container Access to Host Sensitive Paths
# - Container Run as Root User

- required_engine_version: 0.57.0

- required_plugin_versions:
    - name: container
      version: 0.4.0

# ============================================================================
# CORE MACROS AND FILTERS
# ============================================================================

- macro: never_true
  condition: (evt.num=0)

- macro: spawned_process
  condition: (evt.type in (execve, execveat))

- macro: modify
  condition: (evt.type in (rename, renameat, renameat2, rmdir, unlink, unlinkat))

- macro: container
  condition: (container.id != host)

- macro: proc_name_exists
  condition: (not proc.name in ("<NA>","N/A"))

- macro: open_read
  condition: (evt.type in (open,openat,openat2) and evt.is_open_read=true and fd.typechar='f' and fd.num>=0)

- macro: open_write
  condition: (evt.type in (open,openat,openat2) and evt.is_open_write=true and fd.typechar='f' and fd.num>=0)

# ============================================================================
# DATABASE RELATED LISTS AND MACROS
# ============================================================================

- list: db_server_binaries
  items: [graphql, postgres]

- macro: user_known_db_spawned_processes
  condition: (never_true)

- macro: postgres_running_wal_e
  condition: (proc.pname=postgres and (proc.cmdline startswith "sh -c envdir /etc/wal-e.d/env /usr/local/bin/wal-e" or proc.cmdline startswith "sh -c envdir \"/run/etc/wal-e.d/env\" wal-g wal-push"))

# ============================================================================
# RULE 1: DB program spawned process
# ============================================================================
- rule: DB program spawned process
  desc: >
    A program related to the database server creates an unexpected child process (other than itself).
    This is not supposed to happen and often follows SQL injection attacks. This behavioral detection could
    indicate potential unauthorized data extraction or tampering with the database.
  condition: >
    spawned_process
    and proc.pname in (db_server_binaries)
    and not proc.name in (db_server_binaries)
    and not postgres_running_wal_e
    and not user_known_db_spawned_processes
  output: Database-related program spawned process other than itself | evt_type=%evt.type user=%user.name user_uid=%user.uid user_loginuid=%user.loginuid process=%proc.name proc_exepath=%proc.exepath parent=%proc.pname command=%proc.cmdline terminal=%proc.tty exe_flags=%evt.arg.flags
  priority: NOTICE
  tags: [maturity_incubating, host, container, process, database, mitre_execution, T1190]
# ============================================================================
# SHELL HISTORY RELATED MACROS AND LISTS
# ============================================================================
- macro: modify_shell_history
  condition: >
    (modify and (
      evt.arg.name endswith "ash_history" or
      evt.arg.name endswith "zsh_history" or
      evt.arg.name contains "fish_read_history" or
      evt.arg.name endswith "fish_history" or
      evt.arg.oldpath endswith "ash_history" or
      evt.arg.oldpath endswith "zsh_history" or
      evt.arg.oldpath contains "fish_read_history" or
      evt.arg.oldpath endswith "fish_history" or
      evt.arg.path endswith "ash_history" or
      evt.arg.path endswith "zsh_history" or
      evt.arg.path contains "fish_read_history" or
      evt.arg.path endswith "fish_history"))

- macro: truncate_shell_history
  condition: >
    (open_write and (
      fd.name endswith "ash_history" or
      fd.name endswith "zsh_history" or
      fd.name contains "fish_read_history" or
      fd.name endswith "fish_history") and evt.arg.flags contains "O_TRUNC")

- macro: var_lib_docker_filepath
  condition: (evt.arg.name startswith /var/lib/docker or fd.name startswith /var/lib/docker)

- list: docker_binaries
  items: [docker, dockerd, containerd-shim, "runc:[1:CHILD]", pause, exe, docker-compose, docker-entrypoi, docker-runc-cur, docker-current, dockerd-current]
# ============================================================================
# RULE 2: Delete or rename shell history
# ============================================================================
- rule: Delete or rename shell history
  desc: >
    Detect shell history deletion, frequently used by unsophisticated adversaries to eliminate evidence.
    Note that it can also trigger when exiting a Terminal shell, such as with `kubectl exec`, which
    may introduce some noise.
  condition: >
    (modify_shell_history or truncate_shell_history)
    and not var_lib_docker_filepath
    and not proc.name in (docker_binaries)
  output: Shell history deleted or renamed | file=%fd.name name=%evt.arg.name path=%evt.arg.path oldpath=%evt.arg.oldpath evt_type=%evt.type user=%user.name user_uid=%user.uid user_loginuid=%user.loginuid process=%proc.name proc_exepath=%proc.exepath parent=%proc.pname command=%proc.cmdline terminal=%proc.tty
  priority: WARNING
  tags: [maturity_incubating, host, container, process, filesystem, mitre_defense_evasion, T1070]
# ============================================================================
# NETWORK TOOL AND REMOTE FILE COPY RELATED LISTS AND MACROS
# ============================================================================
- list: ingress_remote_file_copy_binaries
  items: [wget]
- macro: ingress_remote_file_copy_procs
  condition: (proc.name in (ingress_remote_file_copy_binaries))

- macro: curl_download
  condition: (proc.name = curl and
              (proc.cmdline contains " -o " or
              proc.cmdline contains " --output " or
              proc.cmdline contains " -O " or
              proc.cmdline contains " --remote-name "))

- macro: user_known_ingress_remote_file_copy_activities
  condition: (never_true)
- list: network_tool_binaries
  items: [nc, ncat, netcat, nmap, dig, tcpdump, tshark, ngrep, telnet, mitmproxy, socat, zmap]
- macro: network_tool_procs
  condition: (proc.name in (network_tool_binaries))
- macro: user_known_network_tool_activities
  condition: (never_true)
# ============================================================================
# RULE 3: Launch Ingress Remote File Copy Tools in Container
# ============================================================================
- rule: Launch Ingress Remote File Copy Tools in Container
  desc: >
    Detect ingress remote file copy tools (such as curl or wget) launched inside containers. This rule can be
    considered a valuable auditing tool, but it has the potential to generate notable noise and requires careful
    profiling before full operationalization.
  condition: >
    spawned_process
    and container
    and (ingress_remote_file_copy_procs or curl_download)
    and not user_known_ingress_remote_file_copy_activities
  output: Ingress remote file copy tool launched in container | evt_type=%evt.type user=%user.name user_uid=%user.uid user_loginuid=%user.loginuid process=%proc.name proc_exepath=%proc.exepath parent=%proc.pname command=%proc.cmdline terminal=%proc.tty exe_flags=%evt.arg.flags
  priority: NOTICE
  tags: [maturity_incubating, container, network, process, mitre_command_and_control, TA0011]
# ============================================================================
# RULE 4: Launch Suspicious Network Tool in Container
# ============================================================================
- rule: Launch Suspicious Network Tool in Container
  desc: >
    Detect network tools (like netcat, nmap, tcpdump, socat, and more) launched within containers without any additional filters.
    This serves as a valuable general detection, but it's recommended to invest engineering effort to fine-tune it and prevent a
    high volume of legitimate logs. This rule complements the more specific "Netcat Remote Code Execution in Container" rule.
  condition: >
    spawned_process
    and container
    and network_tool_procs
    and not user_known_network_tool_activities
  output: Network tool launched in container | evt_type=%evt.type user=%user.name user_uid=%user.uid user_loginuid=%user.loginuid process=%proc.name proc_exepath=%proc.exepath parent=%proc.pname command=%proc.cmdline terminal=%proc.tty exe_flags=%evt.arg.flags
  priority: NOTICE
  tags: [maturity_incubating, container, network, process, mitre_execution, T1059]
# ============================================================================
# ENVIRONMENT VARIABLE RELATED LISTS AND MACROS
# ============================================================================

- list: known_binaries_to_read_environment_variables_from_proc_files
  items: [scsi_id, argoexec]
# ============================================================================
# RULE 5: Read environment variable from /proc files
# ============================================================================
- rule: Read environment variable from /proc files
  desc: >
    An attempt to read process environment variables from /proc files. The consequences are akin to accessing traditional
    sensitive files, as sensitive data, including secrets, might be stored in environment variables. Understanding your
    environment, such as identifying critical namespaces, and incorporating extra filtering statements to alert exclusively
    for those, can enhance the rule's effectiveness.
  condition: >
    open_read
    and container
    and (fd.name glob /proc/*/environ)
    and not proc.name in (known_binaries_to_read_environment_variables_from_proc_files)
  output: Environment variables were retrieved from /proc files | file=%fd.name gparent=%proc.aname[2] ggparent=%proc.aname[3] gggparent=%proc.aname[4] evt_type=%evt.type user=%user.name user_uid=%user.uid user_loginuid=%user.loginuid process=%proc.name proc_exepath=%proc.exepath parent=%proc.pname command=%proc.cmdline terminal=%proc.tty
  priority: WARNING
  tags: [maturity_incubating, container, filesystem, process, mitre_discovery, T1083]
# ============================================================================
# CONTAINER HOST PATH ACCESS RELATED MACROS
# ============================================================================
- macro: user_known_host_path_access
  condition: (never_true)

- macro: known_container_runtime_host_access
  condition: (proc.name in (containerd, containerd-shim, dockerd, docker, runc, crio, cri-o, conmon, podman))
# ============================================================================
# RULE 6: Container Access to Host Sensitive Paths
# ============================================================================
- rule: Container Access to Host Sensitive Paths
  desc: >
    Detects container processes accessing paths that typically only exist when the host filesystem
    is mounted into the container (like /host, /rootfs, /hostfs). This may indicate a container
    escape attempt or a misconfigured volume mount that exposes the host filesystem. Legitimate
    monitoring or backup containers may access these paths, so tune accordingly using the
    user_known_host_path_access macro.
  condition: >
    (open_read or open_write)
    and container
    and (fd.name startswith /host/ or
         fd.name startswith /rootfs/ or
         fd.name startswith /hostfs/)
    and not known_container_runtime_host_access
    and not user_known_host_path_access
  output: Container accessing host filesystem paths | file=%fd.name evt_type=%evt.type user=%user.name user_uid=%user.uid user_loginuid=%user.loginuid process=%proc.name proc_exepath=%proc.exepath parent=%proc.pname command=%proc.cmdline terminal=%proc.tty
  priority: WARNING
  tags: [maturity_sandbox, container, filesystem, mitre_privilege_escalation, T1611]

# ============================================================================
# ROOT USER CONTAINER RELATED LISTS AND MACROS
# ============================================================================
- list: run_as_root_image_list
  items: []
- macro: user_known_run_as_root_container
  condition: (container.image.repository in (run_as_root_image_list))

# ============================================================================
# RULE 7: Container Run as Root User
# ============================================================================

- rule: Container Run as Root User
  desc: >
    Container detected running as the root user. This should be taken into account especially when policies disallow containers from running with
    root user privileges. Note that a root user in containers doesn't inherently possess extensive power, as modern container environments define
    privileges through Linux capabilities. To learn more, check out the rule "Launch Privileged Container".
  condition: >
    spawned_process
    and container
    and proc.vpid=1
    and user.uid=0
    and not user_known_run_as_root_container
  enabled: false
  output: Container launched with root user privilege | evt_type=%evt.type user=%user.name user_uid=%user.uid user_loginuid=%user.loginuid process=%proc.name proc_exepath=%proc.exepath parent=%proc.pname command=%proc.cmdline terminal=%proc.tty exe_flags=%evt.arg.flags
  priority: INFO
  tags: [maturity_sandbox, container, process, users, mitre_execution, T1610]